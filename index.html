<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entre Dos</title>

<style>
body{
  margin:0;
  background:#050508;
  color:#e8e0d0;
  font-family:serif;
  overflow-x:hidden;
}

/* 🎬 FULLSCREEN VIDEO */
.hero video{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
  z-index:-2;
  opacity:0.35;
}

/* DARK OVERLAY */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.85));
  z-index:-1;
}

/* HERO TEXT */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.hero h1{
  font-size:3rem;
  letter-spacing:0.3em;
  text-transform:uppercase;
}

/* TERMINAL */
.terminal{
  max-width:500px;
  margin:3rem auto;
  border:1px solid rgba(0,201,177,0.2);
  padding:1rem;
  background:rgba(0,0,0,0.6);
}

input{
  width:100%;
  background:none;
  border:none;
  color:#00c9b1;
  font-size:1.2rem;
  outline:none;
}

/* FLASH EFFECT */
.flash{
  position:fixed;
  inset:0;
  background:#00c9b1;
  opacity:0;
}

.flash.active{
  animation:flashAnim 0.6s;
}

@keyframes flashAnim{
  0%{opacity:0.7;}
  100%{opacity:0;}
}

/* UNLOCK AREA */
.unlock{
  display:none;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding:3rem 1rem;
}

/* SIGNAL TEXT */
.signal{
  font-size:1.8rem;
  letter-spacing:0.3em;
  color:#00c9b1;
  margin-bottom:2rem;
  animation:pulse 3s infinite;
}

@keyframes pulse{
  0%,100%{opacity:0.6;}
  50%{opacity:1;}
}

/* GLITCH EFFECT */
.signal:hover{
  animation:glitch 0.3s;
}

@keyframes glitch{
  0%{transform:translate(0);}
  25%{transform:translate(3px,-3px);}
  50%{transform:translate(-3px,3px);}
  75%{transform:translate(2px,-2px);}
  100%{transform:translate(0);}
}

/* IMAGES */
.img{
  display:none;
  max-width:90%;
  margin:2rem 0;
  border:1px solid rgba(255,255,255,0.1);
  opacity:0;
  transform:translateY(20px);
  transition:all 1s ease;
}

.img.show{
  display:block;
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<!-- 🎬 VIDEO BACKGROUND -->
<section class="hero">
  <video autoplay muted loop>
    <source src="Haven_Bay.mp4" type="video/mp4">
  </video>
  <h1>entre dos</h1>
</section>

<!-- 🧠 INPUT SYSTEM -->
<div class="terminal">
  <input id="input" placeholder="type what you know..." autocomplete="off">
</div>

<!-- ⚡ FLASH -->
<div class="flash" id="flash"></div>

<!-- 🔓 UNLOCK SYSTEM -->
<div class="unlock" id="unlock">
  <div class="signal">the signal opens the gate</div>

  <!-- Progressive images -->
  <img src="INTERNAL_MEMORANDUM.jpg" class="img">
  <img src="Book_2_teaser.jpg" class="img">
  <img src="The_world_grid.jpg" class="img">
</div>

<script>
const PHRASE = "the signal opens the gate";

const input = document.getElementById("input");
const unlock = document.getElementById("unlock");
const flash = document.getElementById("flash");
const images = document.querySelectorAll(".img");

let unlocked = false;

/* INPUT HANDLER */
input.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    let val = input.value.trim().toLowerCase();
    input.value = "";

    if(val === PHRASE && !unlocked){
      unlocked = true;

      // ⚡ FLASH
      flash.classList.add("active");

      setTimeout(()=>{
        unlock.style.display = "flex";
        revealImages();
      }, 400);
    }
  }
});

/* PROGRESSIVE REVEAL */
function revealImages(){
  images.forEach((img, i)=>{
    setTimeout(()=>{
      img.classList.add("show");
    }, i * 1500); // delay per image
  });
}
</script>

</body>
</html>
